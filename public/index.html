<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg>
    <span class="brand-name">LLM Monitor</span>
    <span class="brand-host" id="brand-host">—</span>
  </div>
  <div class="header-right">
    <div class="host-pill" id="host-pill">
      <span class="pill-dot" id="pill-dot"></span>
      <span id="pill-label">connecting...</span>
    </div>
    <span class="last-update" id="last-updated">—</span>
  </div>
</header>

<main>
  <div class="top-row">

    <div class="card" id="card-status">
      <div class="card-label">SERVER</div>
      <div class="status-main">
        <div class="status-ring" id="status-ring">
          <div class="status-ring-dot"></div>
        </div>
        <div>
          <div class="status-text" id="status-text">—</div>
          <div class="status-sub" id="status-checked">—</div>
        </div>
      </div>
      <div class="action-list">
        <button id="btn-wake" onclick="action('wake')" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          Wake server
        </button>
        <button id="btn-sleep" onclick="action('sleep')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Shut down
        </button>
        <button id="btn-restart" onclick="action('restart-ollama')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.15-7.36"/></svg>
          Restart Ollama
        </button>
      </div>
      <div class="action-msg" id="action-msg"></div>
    </div>

    <div class="card" id="card-memory">
      <div class="card-label">RAM</div>
      <div id="memory-content"><span class="dim-text">Loading...</span></div>
    </div>

    <div class="card" id="card-network">
      <div class="card-label">LAN PORTS</div>
      <div id="network-content"><span class="dim-text">Loading...</span></div>
    </div>

    <div class="card" id="card-ollama-app">
      <div class="card-label-row">
        <div class="card-label">OLLAMA APP</div>
        <span id="ollama-app-image" class="ollama-image-tag"></span>
      </div>
      <div id="ollama-app-content"><span class="dim-text">Loading...</span></div>
    </div>

  </div>

  <div class="card" id="card-ollama">
    <div class="card-label">LOADED MODELS</div>
    <div id="ollama-content"><span class="dim-text">Loading...</span></div>
  </div>

  <div class="card" id="card-gpu">
    <div class="card-label">GPU</div>
    <div class="gpu-grid" id="gpu-content">
      <span class="dim-text">Loading...</span>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
